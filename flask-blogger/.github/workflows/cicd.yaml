name: CI/CD

on: # Trigger
  push:
    branches: [main] # git push origin main -> trigger the workflow
  pull_request:
    branches: [main] # Tạo pull request -> workflow cũng chạy

env: 
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flask-blog

jobs:
  test: # Tên job (CI)
    runs-on: ubuntu-latest # Runner
    steps:
      - uses: actions/checkout@v4 # git checkout
      - uses: actions/setup-python@v5  # Thiết lập môi trường Python
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v || echo "No tests yet"

  build-and-push: # Tên job (CD)
    needs: test # Chạy job này sau khi job test chạy xong
    runs-on: ubuntu-latest # Runner
    if: github.ref == 'refs/heads/main' # Chỉ chạy job này khi push vào nhánh main
    permissions: # Quyền truy cập
      contents: read # Cho phép đọc repo
      packages: write # Cho phép push image lên GitHub Container Registry
    steps:
      - uses: actions/checkout@v4 # git checkout
      - uses: docker/login-action@v3 # Đăng nhập vào GitHub Container Registry
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5 # Build và push Docker image
        with:
          push: true # Push image lên GitHub Container Registry
          tags: | # Tags cho image
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

